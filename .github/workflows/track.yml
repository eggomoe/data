name: track
on:
  schedule:
    - cron: '*/5 * * * *'   # every 10 min (5 is the GitHub minimum; raise if you like)
  workflow_dispatch:          # lets you run it on demand from the Actions tab
permissions:
  contents: write
concurrency:
  group: track
  cancel-in-progress: false
jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: poll and commit (race-safe)
        run: |
          git config user.name  "altar-bot"
          git config user.email "actions@users.noreply.github.com"
          for i in 1 2 3 4 5; do
            git fetch -q origin main
            git reset -q --hard origin/main      # start from the very latest
            python poll.py                        # append the reading on top
            git add data.csv
            git commit -q -m "data: $(date -u +%FT%TZ)" || { echo "nothing to commit"; exit 0; }
            if git push -q origin HEAD:main; then echo "pushed"; exit 0; fi
            echo "push race on attempt $i, retrying"; sleep $((RANDOM % 5 + 2))
          done
          echo "failed after retries"; exit 1
