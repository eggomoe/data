name: track
on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 min (5 is the GitHub minimum; raise if you like)
  workflow_dispatch:          # lets you run it on demand from the Actions tab
permissions:
  contents: write
concurrency:
  group: track
  cancel-in-progress: false
jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python poll.py
      - name: commit reading
        run: |
          git config user.name  "altar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.csv
          git diff --quiet --cached && echo "no change" && exit 0
          git commit -m "data: $(date -u +%FT%TZ)"
          git pull --rebase --autostash || true
          git push
