<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Server watch</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root{--bg:#14161a;--panel:#1b1e24;--panel2:#1f232a;--line:#2a2e36;--text:#e6e8ec;--muted:#7d838d;--red:#ff1f29;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:26px 20px 48px}
  header{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  h1{font-size:18px;font-weight:600;letter-spacing:.2px;margin:0}
  .tag{color:var(--red);font-weight:700}
  .status{color:var(--muted);font-size:12px;flex-basis:100%;order:3}
  .mono{font-family:ui-monospace,"JetBrains Mono",Menlo,monospace}
  select{background:var(--panel2);border:1px solid var(--line);color:var(--text);font:500 12px/1 ui-sans-serif;padding:7px 11px;border-radius:8px}
  #view{margin-left:auto}
  .standings{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:18px}
  .srv{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;border-left:4px solid var(--red)}
  .srv .name{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;margin-bottom:10px}
  .srv .now{font:600 32px/1 ui-monospace,"JetBrains Mono",Menlo,monospace}
  .srv .now small{font-size:13px;color:var(--muted);font-weight:500}
  .srv .meta{margin-top:9px;font-size:11px;color:var(--muted);display:flex;gap:12px}
  .srv .meta b{color:#c4c9d1;font-weight:600}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:18px}
  .kpi{background:var(--panel);padding:15px 18px}
  .kpi .k{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;margin-bottom:9px}
  .kpi .v{font:600 30px/1 ui-monospace,"JetBrains Mono",Menlo,monospace}
  .kpi .v small{font-size:13px;color:var(--muted);font-weight:500}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px 14px;margin-bottom:16px}
  .card-h{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .card-h .t{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#b9bec6}
  .card-h .sub{font-size:11px;color:var(--muted);margin-left:auto}
  .ranges{display:flex;gap:6px}
  .ranges button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);font:500 11px/1 ui-sans-serif;padding:6px 10px;border-radius:7px;cursor:pointer}
  .ranges button.on{background:rgba(255,31,41,.14);border-color:rgba(255,31,41,.45);color:#ffd9da}
  .card-h select{margin-left:auto;padding:6px 10px;font-size:11px;border-radius:7px}
  .chart-h{height:340px;position:relative}
  .bar-h{height:200px;position:relative}
  .cols{display:grid;grid-template-columns:1fr 1.25fr;gap:16px}
  @media(max-width:860px){.cols{grid-template-columns:1fr}}
  .hm{display:grid;grid-template-columns:32px repeat(24,1fr);gap:3px;align-items:center}
  .hm .hourlab,.hm .daylab{font-size:9px;color:var(--muted)}
  .hm .hourlab{text-align:center}
  .hm .daylab{text-align:right;padding-right:7px;font-size:10px}
  .hm .cell{height:16px;border-radius:3px;background:#1f2228}
  footer{color:var(--muted);font-size:11.5px;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="tag">Server</span> watch</h1>
    <select id="view"></select>
    <span class="status" id="status">loading…</span>
  </header>

  <div class="standings" id="standings"></div>

  <div class="kpis" id="kpis" style="display:none">
    <div class="kpi"><div class="k">Now</div><div class="v" id="k-now">—</div></div>
    <div class="kpi"><div class="k">Peak</div><div class="v" id="k-peak">—</div></div>
    <div class="kpi"><div class="k">Average</div><div class="v" id="k-avg">—</div></div>
    <div class="kpi"><div class="k">Uptime</div><div class="v" id="k-up">—</div></div>
  </div>

  <div class="card">
    <div class="card-h">
      <span class="t" id="line-t">Players over time</span>
      <div class="ranges" id="ranges">
        <button data-w="3600">1h</button><button data-w="21600">6h</button>
        <button data-w="86400">24h</button><button data-w="604800">7d</button>
        <button data-w="0" class="on">All</button>
      </div>
    </div>
    <div class="chart-h"><canvas id="line"></canvas></div>
    <footer id="line-foot">click a server in the legend to hide/show it</footer>
  </div>

  <div class="cols">
    <div class="card">
      <div class="card-h"><span class="t">Busiest hours</span><span class="sub" id="bar-sub">avg by hour</span></div>
      <div class="bar-h"><canvas id="bar"></canvas></div>
    </div>
    <div class="card">
      <div class="card-h"><span class="t">When they're online</span><select id="pick"></select></div>
      <div class="hm" id="hm"></div>
    </div>
  </div>
</div>

<script>
const RED="#ff1f29";
const PALETTE=["#2dd4bf","#f59e0b","#a78bfa","#38bdf8","#a3e635","#f472b6","#fb7185","#facc15"];
const mean=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
const $=id=>document.getElementById(id);
let ROWS=[],SERVERS=[],COLORS={},lineChart,barChart,win=0,view="ALL",pick=null;

function colorMap(servers){const c={};let pi=0;servers.forEach(s=>{c[s]=s.toLowerCase()==="altarextra"?RED:PALETTE[pi++%PALETTE.length];});return c;}
function statsFor(rows){const o=rows.filter(r=>r.online),c=o.map(r=>r.count),last=rows[rows.length-1];
  return {now:last?(last.online?last.count:null):null,peak:c.length?Math.max(...c):null,avg:c.length?mean(c):null,uptime:rows.length?o.length/rows.length:null};}
function hexParts(h){h=h.replace("#","");return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function rgba(h,a){const[r,g,b]=hexParts(h);return `rgba(${r},${g},${b},${a})`;}

async function load(){
  let text;
  try{text=await (await fetch("data.csv?t="+Date.now())).text();}
  catch{$("status").textContent="can't load data.csv";return;}
  ROWS=text.trim().split(/\r?\n/).slice(1).filter(Boolean).map(l=>{const p=l.split(",");
    return {ts:+p[0],server:p[1],online:+p[2],count:+p[3]};}).filter(r=>!isNaN(r.ts)&&r.server);
  SERVERS=[...new Set(ROWS.map(r=>r.server))]
    .sort((a,b)=>a.toLowerCase()==="altarextra"?-1:b.toLowerCase()==="altarextra"?1:a.localeCompare(b));
  COLORS=colorMap(SERVERS);
  if(view!=="ALL" && !SERVERS.includes(view)) view="ALL";
  if(!pick||!SERVERS.includes(pick)) pick=SERVERS[0]||null;

  const last=ROWS[ROWS.length-1];
  $("status").textContent=ROWS.length
    ? `${SERVERS.length} servers · ${ROWS.length} samples · updated ${new Date(last.ts*1000).toLocaleTimeString()}`
    : "collecting — first readings within ~10 min";

  renderViewSelect(); renderPicker(); apply();
}

function renderViewSelect(){
  $("view").innerHTML = `<option value="ALL"${view==="ALL"?" selected":""}>All servers (compare)</option>`
    + SERVERS.map(s=>`<option value="${s}"${view===s?" selected":""}>${s}</option>`).join("");
}
function renderPicker(){
  $("pick").innerHTML=SERVERS.map(s=>`<option ${s===pick?"selected":""}>${s}</option>`).join("");
}

function apply(){
  const focus = view!=="ALL";
  $("standings").style.display = focus?"none":"grid";
  $("kpis").style.display = focus?"grid":"none";
  $("pick").style.display = focus?"none":"";
  $("line-t").textContent = focus ? `${view} · players over time` : "Players over time";
  $("line-foot").style.display = focus ? "none" : "";
  $("bar-sub").textContent = focus ? "avg by hour" : (pick? "avg by hour · "+pick : "avg by hour");
  if(focus) renderKPIs(); else renderStandings();
  renderLine();
  renderDetail(focus ? view : pick);
}

function renderStandings(){
  const cards=SERVERS.map(s=>({s,st:statsFor(ROWS.filter(r=>r.server===s))}))
    .sort((a,b)=>(b.st.now??-1)-(a.st.now??-1));
  $("standings").innerHTML=cards.map(({s,st})=>`
    <div class="srv" style="border-left-color:${COLORS[s]}">
      <div class="name"><span style="width:9px;height:9px;border-radius:50%;background:${COLORS[s]};display:inline-block"></span>${s}</div>
      <div class="now mono">${st.now==null?'<small>asleep</small>':st.now+' <small>online</small>'}</div>
      <div class="meta"><span>peak <b>${st.peak??'—'}</b></span>
        <span>avg <b>${st.avg!=null?st.avg.toFixed(1):'—'}</b></span>
        <span>up <b>${st.uptime!=null?Math.round(st.uptime*100)+'%':'—'}</b></span></div>
    </div>`).join("");
}

function renderKPIs(){
  const st=statsFor(ROWS.filter(r=>r.server===view));
  $("k-now").innerHTML = st.now==null?'<small>asleep</small>':st.now+' <small>online</small>';
  $("k-peak").textContent = st.peak??'—';
  $("k-avg").textContent = st.avg!=null?st.avg.toFixed(1):'—';
  $("k-up").innerHTML = st.uptime!=null?Math.round(st.uptime*100)+' <small>%</small>':'—';
}

function renderLine(){
  const cut=win?Date.now()-win*1000:0;
  const list = view==="ALL" ? SERVERS : [view];
  const single = list.length===1;
  const datasets=list.map(s=>{
    const pts=ROWS.filter(r=>r.server===s).map(r=>({x:r.ts*1000,y:r.online?r.count:null})).filter(p=>p.x>=cut);
    const ds={label:s,data:pts,borderColor:COLORS[s],borderWidth:s.toLowerCase()==="altarextra"?2.4:1.8,
      pointRadius:0,tension:.25,spanGaps:false,backgroundColor:"transparent",fill:false};
    if(single){ds.fill=true;ds.backgroundColor=rgba(COLORS[s],.18);}
    return ds;
  });
  if(!lineChart){
    lineChart=new Chart($("line"),{type:"line",data:{datasets},
      options:{responsive:true,maintainAspectRatio:false,animation:false,interaction:{mode:"nearest",intersect:false},
        plugins:{legend:{display:!single,labels:{color:"#c4c9d1",boxWidth:10,boxHeight:10,usePointStyle:true}},
          tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y} players`}}},
        scales:{x:{type:"time",time:{tooltipFormat:"MMM d HH:mm",displayFormats:{hour:"HH:mm",day:"MMM d"}},
            grid:{color:"#23262d"},ticks:{color:"#7d838d",maxRotation:0}},
          y:{beginAtZero:true,grid:{color:"#23262d"},ticks:{color:"#7d838d"}}}}});
  }else{
    lineChart.data.datasets=datasets;
    lineChart.options.plugins.legend.display=!single;
    lineChart.update();
  }
}

function renderDetail(server){
  const onl=ROWS.filter(r=>r.server===server && r.online), col=COLORS[server]||RED;
  const buckets=Array.from({length:24},()=>[]);
  onl.forEach(r=>buckets[new Date(r.ts*1000).getHours()].push(r.count));
  const vals=buckets.map(b=>{const m=mean(b);return m==null?null:+m.toFixed(1);});
  const labels=buckets.map((_,h)=>String(h).padStart(2,"0"));
  const fill=rgba(col,.55);
  if(!barChart){
    barChart=new Chart($("bar"),{type:"bar",data:{labels,datasets:[{data:vals,backgroundColor:fill,borderColor:col,borderWidth:1,borderRadius:3}]},
      options:{responsive:true,maintainAspectRatio:false,animation:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{title:c=>c[0].label+":00",label:c=>(c.parsed.y??"—")+" avg"}}},
        scales:{x:{grid:{display:false},ticks:{color:"#7d838d",autoSkip:true,maxTicksLimit:8}},
          y:{beginAtZero:true,grid:{color:"#23262d"},ticks:{color:"#7d838d"}}}}});
  }else{
    barChart.data.datasets[0].data=vals;barChart.data.datasets[0].backgroundColor=fill;barChart.data.datasets[0].borderColor=col;barChart.update();
  }
  const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],order=[1,2,3,4,5,6,0];
  const grid=Array.from({length:7},()=>Array.from({length:24},()=>[]));
  onl.forEach(r=>{const d=new Date(r.ts*1000);grid[order.indexOf(d.getDay())][d.getHours()].push(r.count);});
  const avg=grid.map(row=>row.map(c=>mean(c)));
  const max=Math.max(1,...avg.flat().filter(v=>v!=null));
  const[cr,cg,cb]=hexParts(col);
  let html='<div></div>';
  for(let h=0;h<24;h++) html+=`<div class="hourlab">${h%6===0?h:""}</div>`;
  for(let d=0;d<7;d++){
    html+=`<div class="daylab">${days[d]}</div>`;
    for(let h=0;h<24;h++){
      const v=avg[d][h];
      const bg=v==null?"#1f2228":`rgba(${cr},${cg},${cb},${(0.12+0.88*(v/max)).toFixed(3)})`;
      const tip=v==null?`${days[d]} ${String(h).padStart(2,"0")}:00 — no data`:`${days[d]} ${String(h).padStart(2,"0")}:00 — ${v.toFixed(1)} avg`;
      html+=`<div class="cell" style="background:${bg}" title="${tip}"></div>`;
    }
  }
  $("hm").innerHTML=html;
}

$("ranges").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
  win=+b.dataset.w;document.querySelectorAll("#ranges button").forEach(x=>x.classList.remove("on"));b.classList.add("on");renderLine();});
$("view").addEventListener("change",e=>{view=e.target.value;apply();});
$("pick").addEventListener("change",e=>{pick=e.target.value;if(view==="ALL")renderDetail(pick);});

load();setInterval(load,60000);
</script>
</body>
</html>
